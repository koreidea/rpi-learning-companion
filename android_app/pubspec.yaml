name: companion_app
description: "Learning Companion — AI bot face + car controller for kids"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Bluetooth Classic (HC-05 SPP)
  bluetooth_classic: ^0.0.4

  # Routing
  go_router: ^14.8.1

  # Config persistence
  shared_preferences: ^2.3.4

  # Audio capture (microphone)
  record: ^5.1.0

  # Audio playback (songs, sounds)
  audioplayers: ^6.1.0

  # Platform TTS (Android/iOS built-in)
  flutter_tts: ^4.2.0

  # HTTP client for cloud APIs (OpenAI, Gemini, Claude)
  dio: ^5.7.0

  # Camera (vision features)
  camera: ^0.11.0+2

  # ML Kit Object Detection (person detection for follow mode)
  google_mlkit_object_detection: ^0.13.0

  # App documents directory (model storage)
  path_provider: ^2.1.4

  # Permission handling
  permission_handler: ^11.3.1

  # On-device speech recognition (wake word detection — free, no API key)
  speech_to_text: ^7.0.0

  # --- Phase 5/6: Offline ML & Wake Word (uncomment when ready to use) ---
  # Offline STT via whisper.cpp — requires native build setup
  # whisper_flutter_new: ^1.3.0
  #
  # Offline LLM via llama.cpp — requires native build setup, large model
  # fllama: ^0.6.0
  #
  # Wake word detection (Picovoice Porcupine) — requires access key
  # porcupine_flutter: ^3.0.0
  #
  # ONNX Runtime for Silero VAD model — requires native build setup
  # onnxruntime_flutter: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/songs/
    - assets/models/
    - assets/content/
