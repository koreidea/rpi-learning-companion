<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HairoBot WiFi Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .logo {
    font-size: 48px;
    margin: 20px 0 5px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 5px;
  }
  .subtitle {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 25px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 15px;
  }
  .card h2 {
    font-size: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .network-list {
    list-style: none;
    max-height: 280px;
    overflow-y: auto;
  }
  .network-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .network-item:hover, .network-item:active {
    background: rgba(255,255,255,0.12);
  }
  .network-item.selected {
    background: rgba(99, 102, 241, 0.3);
    border: 1px solid rgba(99, 102, 241, 0.5);
  }
  .net-name {
    font-size: 15px;
    font-weight: 500;
  }
  .net-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #aaa;
  }
  .signal-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
  }
  .signal-bars .bar {
    width: 4px;
    background: #555;
    border-radius: 1px;
  }
  .signal-bars .bar.active { background: #6ee7b7; }
  .signal-bars .bar:nth-child(1) { height: 4px; }
  .signal-bars .bar:nth-child(2) { height: 8px; }
  .signal-bars .bar:nth-child(3) { height: 12px; }
  .signal-bars .bar:nth-child(4) { height: 16px; }
  .lock { font-size: 12px; }
  .password-section {
    display: none;
    margin-top: 15px;
  }
  .password-section.visible { display: block; }
  .password-section label {
    font-size: 13px;
    color: #ccc;
    display: block;
    margin-bottom: 6px;
  }
  .input-wrap {
    display: flex;
    gap: 8px;
  }
  input[type="password"], input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 15px;
    outline: none;
  }
  input:focus {
    border-color: #6366f1;
    box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
  }
  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    width: 100%;
    margin-top: 12px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #ccc;
    margin-top: 8px;
  }
  .status {
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
  }
  .status.show { display: block; }
  .status.connecting {
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.4);
  }
  .status.success {
    background: rgba(16, 185, 129, 0.2);
    border: 1px solid rgba(16, 185, 129, 0.4);
  }
  .status.error {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.4);
  }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scanning-msg {
    text-align: center;
    padding: 30px;
    color: #aaa;
  }
  .footer {
    margin-top: auto;
    padding-top: 20px;
    text-align: center;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>
  <div class="logo">🤖</div>
  <h1>HairoBot WiFi Setup</h1>
  <p class="subtitle">Connect your bot to a WiFi network</p>

  <div class="card">
    <h2>📶 Available Networks</h2>
    <div id="scanning" class="scanning-msg"><span class="spinner"></span>Scanning...</div>
    <ul class="network-list" id="networkList"></ul>
    <button class="btn btn-secondary" onclick="scanNetworks()">🔄 Rescan</button>
  </div>

  <div class="card">
    <div id="passwordSection" class="password-section">
      <label>Password for <strong id="selectedSSID"></strong></label>
      <input type="password" id="password" placeholder="Enter WiFi password" autocomplete="off">
    </div>
    <button class="btn btn-primary" id="connectBtn" disabled onclick="connectWiFi()">Connect</button>
  </div>

  <div class="status" id="statusMsg"></div>

  <div class="footer">
    Connect your phone to <strong>HairoBot-Setup</strong> (password: hairobot1)
  </div>

<script>
let selectedSSID = '';
let selectedSecurity = '';

async function scanNetworks() {
  const list = document.getElementById('networkList');
  const scanning = document.getElementById('scanning');
  list.innerHTML = '';
  scanning.style.display = 'block';
  document.getElementById('connectBtn').disabled = true;
  document.getElementById('passwordSection').classList.remove('visible');
  selectedSSID = '';

  try {
    const resp = await fetch('/api/scan');
    const networks = await resp.json();
    scanning.style.display = 'none';

    if (networks.length === 0) {
      list.innerHTML = '<li style="padding:15px;text-align:center;color:#aaa">No networks found. Try rescanning.</li>';
      return;
    }

    networks.forEach(net => {
      const li = document.createElement('li');
      li.className = 'network-item';
      li.onclick = () => selectNetwork(net.ssid, net.security, li);

      const signal = net.signal;
      const bars = [signal > 10, signal > 30, signal > 55, signal > 75];
      const barsHTML = bars.map(a => `<div class="bar ${a ? 'active' : ''}"></div>`).join('');
      const lockIcon = net.security ? '🔒' : '';

      li.innerHTML = `
        <div>
          <div class="net-name">${escapeHtml(net.ssid)}</div>
          <div class="net-info">${lockIcon} <span class="lock">${escapeHtml(net.security || 'Open')}</span></div>
        </div>
        <div class="signal-bars">${barsHTML}</div>
      `;
      list.appendChild(li);
    });
  } catch (e) {
    scanning.style.display = 'none';
    list.innerHTML = '<li style="padding:15px;text-align:center;color:#f87171">Scan failed. Try again.</li>';
  }
}

function selectNetwork(ssid, security, element) {
  selectedSSID = ssid;
  selectedSecurity = security;

  document.querySelectorAll('.network-item').forEach(el => el.classList.remove('selected'));
  element.classList.add('selected');

  const pwSection = document.getElementById('passwordSection');
  const connectBtn = document.getElementById('connectBtn');
  document.getElementById('selectedSSID').textContent = ssid;

  if (security && security !== '--') {
    pwSection.classList.add('visible');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  } else {
    pwSection.classList.remove('visible');
  }
  connectBtn.disabled = false;
}

async function connectWiFi() {
  if (!selectedSSID) return;

  const password = document.getElementById('password').value;
  const btn = document.getElementById('connectBtn');
  const status = document.getElementById('statusMsg');

  btn.disabled = true;
  btn.textContent = 'Connecting...';
  status.className = 'status show connecting';
  status.innerHTML = '<span class="spinner"></span>Connecting to ' + escapeHtml(selectedSSID) + '... This may take 15 seconds.';

  try {
    const resp = await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ssid: selectedSSID, password: password })
    });
    const data = await resp.json();

    status.className = 'status show success';
    status.innerHTML = escapeHtml(data.message) +
      '<br><br>The bot will restart automatically. You can close this page and reconnect to your home WiFi.';
  } catch (e) {
    status.className = 'status show error';
    status.textContent = 'Connection request sent. If the bot connects, this page will stop working (that means it worked!). Reconnect to your home WiFi and visit the bot.';
  }

  btn.textContent = 'Connect';
  btn.disabled = false;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Scan on page load
scanNetworks();
</script>
</body>
</html>
